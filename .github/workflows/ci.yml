name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PY_DRAFTER_FIXTURE_REF: 55adfb54b044d00305b74fcc4d78d79185346219
      PY_DRAFTER_FIXTURE_CHECKOUT: /tmp/context-compiler-directive-drafter-source

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout Python directive-drafter fixture source
        run: |
          echo "Python directive-drafter fixture ref: ${PY_DRAFTER_FIXTURE_REF}"
          echo "Python checkout path: ${PY_DRAFTER_FIXTURE_CHECKOUT}"
          git init "${PY_DRAFTER_FIXTURE_CHECKOUT}"
          git -C "${PY_DRAFTER_FIXTURE_CHECKOUT}" remote add origin https://github.com/rlippmann/context-compiler-directive-drafter
          git -C "${PY_DRAFTER_FIXTURE_CHECKOUT}" fetch --depth 1 origin "${PY_DRAFTER_FIXTURE_REF}"
          git -C "${PY_DRAFTER_FIXTURE_CHECKOUT}" checkout --detach FETCH_HEAD
          echo "Resolved fixture source: ${PY_DRAFTER_FIXTURE_CHECKOUT}/tests/fixtures/preprocessor"

      - name: Check preprocessor fixture drift
        env:
          PREPROCESSOR_FIXTURES_SOURCE: /tmp/context-compiler-directive-drafter-source/tests/fixtures/preprocessor
        run: |
          echo "Using PREPROCESSOR_FIXTURES_SOURCE=${PREPROCESSOR_FIXTURES_SOURCE}"
          npm run fixtures:preprocessor:check

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
